server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: ms-gestion-instructor
  datasource:
    # Credenciales y host externalizados por entorno (buenas practicas en prod)
    url: jdbc:postgresql://${DB_HOST:pg-instructor}:${DB_PORT:5432}/${DB_NAME:instructordb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate      # en prod NO se altera el esquema (usar migraciones)
    show-sql: false

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://registry-server:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info
