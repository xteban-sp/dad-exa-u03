server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: ms-gestion-taller
  datasource:
    url: jdbc:postgresql://${DB_HOST:pg-taller}:${DB_PORT:5432}/${DB_NAME:tallerdb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://registry-server:8761/eureka}

resilience4j:
  circuitbreaker:
    configs:
      default:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        ignore-exceptions:
          - feign.FeignException$NotFound

management:
  endpoints:
    web:
      exposure:
        include: health,info
