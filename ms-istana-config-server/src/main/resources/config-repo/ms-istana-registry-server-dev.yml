server:
  port: 8761

spring:
  application:
    name: ms-istana-registry-server

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka
  server:
    # En desarrollo: desactiva la auto-preservacion para que expire
    # rapido las instancias muertas (evita registros fantasma).
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info
