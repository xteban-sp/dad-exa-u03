server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: ms-istana-gestion-alumno
  datasource:
    url: jdbc:postgresql://${DB_HOST:pg-alumno}:${DB_PORT:5432}/${DB_NAME:alumnodb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://registry-server:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info
