server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: ms-istana-auth
  datasource:
    url: jdbc:postgresql://${DB_HOST:pg-auth}:${DB_PORT:5432}/${DB_NAME:authdb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

jwt:
  # En prod el secreto se externaliza por variable de entorno (NUNCA en el repo)
  secret: ${JWT_SECRET:dad-upeu-microservicios-jwt-secret-key-2026-super-segura-0123456789}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://registry-server:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info
